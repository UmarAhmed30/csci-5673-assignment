syntax = "proto3";

package product;

// ---------------------------------------------------------------------------
// Shared message types
// ---------------------------------------------------------------------------

message Item {
    int32  item_id        = 1;
    int32  seller_id      = 2;
    string item_name      = 3;
    int32  category       = 4;
    string condition_type = 5;
    float  price          = 6;
    int32  quantity       = 7;
    int32  thumbs_up      = 8;
    int32  thumbs_down    = 9;
}

message CartItem {
    int32 item_id  = 1;
    int32 quantity = 2;
    bool  saved    = 3;
}

message Purchase {
    int32  item_id   = 1;
    int32  quantity  = 2;
    string timestamp = 3;
}

// Lightweight cart item used as write input (no saved flag needed for writes).
message WriteCartItem {
    int32 item_id  = 1;
    int32 quantity = 2;
}

// ---------------------------------------------------------------------------
// RPC request / response messages
// ---------------------------------------------------------------------------

// --- SearchItems ---
message SearchItemsRequest {
    int32           category = 1;
    repeated string keywords = 2;
}
message SearchItemsResponse {
    repeated Item items = 1;
}

// --- GetItem ---
message GetItemRequest {
    int32 item_id = 1;
}
message GetItemResponse {
    bool   success = 1;
    Item   item    = 2;
    string message = 3;
}

// --- AddToCart ---
message AddToCartRequest {
    int32 buyer_id = 1;
    int32 item_id  = 2;
    int32 quantity = 3;
}
message AddToCartResponse {
    bool   success = 1;
    string message = 2;
}

// --- RemoveFromCart ---
message RemoveFromCartRequest {
    int32 buyer_id = 1;
    int32 item_id  = 2;
    int32 quantity = 3;
}
message RemoveFromCartResponse {
    bool   success = 1;
    string message = 2;
}

// --- GetCart ---
message GetCartRequest {
    int32 buyer_id = 1;
}
message GetCartResponse {
    repeated CartItem items = 1;
}

// --- ClearCart ---
message ClearCartRequest {
    int32 buyer_id = 1;
}
message ClearCartResponse {}

// --- ClearUnsavedCart (called on logout) ---
message ClearUnsavedCartRequest {
    int32 buyer_id = 1;
}
message ClearUnsavedCartResponse {}

// --- SaveCart ---
message SaveCartRequest {
    int32 buyer_id = 1;
}
message SaveCartResponse {
    bool   success = 1;
    string message = 2;
}

// --- ProvideItemFeedback ---
message ProvideItemFeedbackRequest {
    int32  item_id  = 1;
    string feedback = 2;
}
message ProvideItemFeedbackResponse {
    bool   success = 1;
    string message = 2;
}

// --- GetBuyerPurchases ---
message GetBuyerPurchasesRequest {
    int32 buyer_id = 1;
}
message GetBuyerPurchasesResponse {
    repeated Purchase purchases = 1;
}

// --- MakePurchase ---
message MakePurchaseRequest {
    int32                 buyer_id   = 1;
    repeated WriteCartItem cart_items = 2;
}
message MakePurchaseResponse {
    bool   success          = 1;
    string message          = 2;
    int32  items_purchased  = 3;
}

// --- RegisterItem ---
message RegisterItemRequest {
    int32           seller_id      = 1;
    string          item_name      = 2;
    int32           category       = 3;
    string          condition_type = 4;
    float           price          = 5;
    int32           quantity       = 6;
    repeated string keywords       = 7;
    int32           item_id        = 8;  // pre-generated by caller for determinism
}
message RegisterItemResponse {
    bool   success = 1;
    int32  item_id = 2;
    string message = 3;
}

// --- DisplayItems ---
message DisplayItemsRequest {
    int32 seller_id = 1;
}
message DisplayItemsResponse {
    repeated Item items = 1;
}

// --- UpdateUnitsForSale ---
message UpdateUnitsForSaleRequest {
    int32 seller_id = 1;
    int32 item_id   = 2;
    int32 quantity  = 3;
}
message UpdateUnitsForSaleResponse {
    bool   success = 1;
    string message = 2;
}

// --- ChangeItemPrice ---
message ChangeItemPriceRequest {
    int32 seller_id = 1;
    int32 item_id   = 2;
    float price     = 3;
}
message ChangeItemPriceResponse {
    bool   success = 1;
    string message = 2;
}

// ---------------------------------------------------------------------------
// Service definition
// ---------------------------------------------------------------------------

service ProductService {
    // Reads — served from local MySQL, no Raft
    rpc SearchItems          (SearchItemsRequest)          returns (SearchItemsResponse);
    rpc GetItem              (GetItemRequest)              returns (GetItemResponse);
    rpc GetCart              (GetCartRequest)              returns (GetCartResponse);
    rpc GetBuyerPurchases    (GetBuyerPurchasesRequest)    returns (GetBuyerPurchasesResponse);
    rpc DisplayItems         (DisplayItemsRequest)         returns (DisplayItemsResponse);

    // Writes — replicated via Raft before being applied to local MySQL
    rpc AddToCart            (AddToCartRequest)            returns (AddToCartResponse);
    rpc RemoveFromCart       (RemoveFromCartRequest)       returns (RemoveFromCartResponse);
    rpc ClearCart            (ClearCartRequest)            returns (ClearCartResponse);
    rpc ClearUnsavedCart     (ClearUnsavedCartRequest)     returns (ClearUnsavedCartResponse);
    rpc SaveCart             (SaveCartRequest)             returns (SaveCartResponse);
    rpc ProvideItemFeedback  (ProvideItemFeedbackRequest)  returns (ProvideItemFeedbackResponse);
    rpc MakePurchase         (MakePurchaseRequest)         returns (MakePurchaseResponse);
    rpc RegisterItem         (RegisterItemRequest)         returns (RegisterItemResponse);
    rpc UpdateUnitsForSale   (UpdateUnitsForSaleRequest)   returns (UpdateUnitsForSaleResponse);
    rpc ChangeItemPrice      (ChangeItemPriceRequest)      returns (ChangeItemPriceResponse);
}
