# MySQL: one server, 10 logical databases (customer_db_0..4 + product_db_0..4) after db-init.
# Run from repo root:  docker compose -f docker/compose/db.yml --env-file docker/.env up -d
# Remote clients use DB_HOST=<mysql VM IP> and port 3306 (or MYSQL_PORT mapping).

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  db-init:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      CUSTOMER_DB_HOST: mysql
      CUSTOMER_DB_PORT: 3306
      CUSTOMER_DB_USER: ${DB_USER:-root}
      CUSTOMER_DB_PASSWORD: ${DB_PASSWORD:-Test@123}
      PRODUCT_DB_HOST: mysql
      PRODUCT_DB_PORT: 3306
      PRODUCT_DB_USER: ${DB_USER:-root}
      PRODUCT_DB_PASSWORD: ${DB_PASSWORD:-Test@123}
    command: >
      sh -c "python db/setup_customer_replicas.py && python db/setup_product_replicas.py"
    restart: "no"

volumes:
  mysql_data:
